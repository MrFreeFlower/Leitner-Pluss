<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Flashcard App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #F3F5F9; /* Matching the light gray-blue background */
        overflow-x: hidden;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-slow-fade {
        animation: fadeIn 0.6s ease-in-out forwards;
      }
      
      @keyframes slideInUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      @keyframes slideOutDown {
        from { transform: translateY(0); }
        to { transform: translateY(100%); }
      }
      .animate-slide-in-up {
        animation: slideInUp 0.15s ease-out forwards;
      }
      .animate-slide-out-down {
        animation: slideOutDown 0.325s ease-in forwards;
      }
      
      @keyframes zoomIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-zoom-in {
        animation: zoomIn 0.25s ease-out forwards;
      }

      @keyframes zoomOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.95); }
      }
      .animate-zoom-out {
        animation: zoomOut 0.25s ease-in forwards;
      }
    </style>
